name: deploy-production

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Git tag or commit SHA to deploy"
        required: true
        type: string

jobs:
  verify-release:
    runs-on: ubuntu-latest
    environment: Testing
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm ci

      - name: Prepare app
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Lint and test
        run: |
          composer lint:check
          php artisan test --compact

      - name: Build frontend
        run: npm run build

  deploy:
    needs: verify-release
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy release to production over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
          script: |
            set -e
            cd ${{ secrets.PRODUCTION_APP_PATH }}
            git fetch --all --tags
            git checkout ${{ inputs.release_ref }}
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            php artisan migrate --force
            npm ci
            npm run build
            php artisan optimize:clear
            php artisan optimize

      - name: Notify deployment result
        if: always()
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[Production] Deploy ${{ job.status }} - ${{ github.repository }}"
          to: ${{ secrets.DEPLOY_NOTIFY_TO }}
          from: ${{ secrets.DEPLOY_NOTIFY_FROM }}
          body: |
            Repository: ${{ github.repository }}
            Release: ${{ inputs.release_ref }}
            Actor: ${{ github.actor }}
            Status: ${{ job.status }}
            Rollback Guide: docs/CI_CD_PROCEDURES.md
