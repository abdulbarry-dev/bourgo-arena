name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: Testing
    strategy:
      matrix:
        php-version: ["8.3", "8.4", "8.5"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Inject Test Environment Variables
        run: |
          sed -i "s|^APP_ENV=.*|APP_ENV=testing|" .env
          sed -i "s|^DB_CONNECTION=.*|DB_CONNECTION=${{ secrets.DB_CONNECTION }}|" .env
          sed -i "s|^DB_HOST=.*|DB_HOST=${{ secrets.DB_HOST }}|" .env
          sed -i "s|^DB_PORT=.*|DB_PORT=${{ secrets.DB_PORT }}|" .env
          sed -i "s|^DB_DATABASE=.*|DB_DATABASE=${{ secrets.DB_DATABASE }}|" .env
          sed -i "s|^DB_USERNAME=.*|DB_USERNAME=${{ secrets.DB_USERNAME }}|" .env
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${{ secrets.DB_PASSWORD }}|" .env
          sed -i "s|^RESEND_API_KEY=.*|RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}|" .env
          sed -i "s|^KONNECT_API_KEY=.*|KONNECT_API_KEY=${{ secrets.KONNECT_API_KEY }}|" .env
          sed -i "s|^KONNECT_API_SECRET=.*|KONNECT_API_SECRET=${{ secrets.KONNECT_API_SECRET }}|" .env
          sed -i "s|^KONNECT_SANDBOX=.*|KONNECT_SANDBOX=${{ secrets.KONNECT_SANDBOX }}|" .env
          sed -i "s|^TWILIO_ACCOUNT_SID=.*|TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}|" .env
          sed -i "s|^TWILIO_AUTH_TOKEN=.*|TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}|" .env
          sed -i "s|^TWILIO_FROM_NUMBER=.*|TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }}|" .env
          sed -i "s|^FIREBASE_PROJECT=.*|FIREBASE_PROJECT=${{ secrets.FIREBASE_PROJECT }}|" .env
          sed -i "s|^DEV_INTEGRITY_BYPASS_TOKEN=.*|DEV_INTEGRITY_BYPASS_TOKEN=${{ secrets.DEV_INTEGRITY_BYPASS_TOKEN }}|" .env
          sed -i "s|^API_WEB_PLATFORM_ENABLED=.*|API_WEB_PLATFORM_ENABLED=${{ secrets.API_WEB_PLATFORM_ENABLED }}|" .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        run: ./vendor/bin/pest
