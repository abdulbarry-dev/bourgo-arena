name: Deploy to Laravel Cloud

on:
  push:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      seed:
        description: 'Run seeders after deployment (staging only)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  test:
    runs-on: ubuntu-latest
    environment: Testing

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm ci

      - name: Add Flux Credentials
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Build Frontend
        run: npm run build

      - name: Lint
        run: vendor/bin/pint --test

      - name: Run Tests
        run: php artisan test --compact

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    env:
      LARAVEL_CLOUD_TOKEN: ${{ secrets.LARAVEL_CLOUD_TOKEN }}
      CLOUD_APP_ID: ${{ secrets.LARAVEL_CLOUD_APP_ID }}
      CLOUD_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Laravel Cloud CLI
        run: composer global require laravel/cloud-cli

      - name: Deploy to Laravel Cloud
        run: |
          export PATH=$PATH:$(composer global config bin-dir --absolute)
          cloud deploy \
            --app=${{ env.CLOUD_APP_ID }} \
            --environment=${{ env.CLOUD_ENV }} \
            --commit=${{ github.sha }} \
            --wait \
            -n

      - name: Run Migrations
        run: |
          export PATH=$PATH:$(composer global config bin-dir --absolute)
          cloud run \
            --app=${{ env.CLOUD_APP_ID }} \
            --environment=${{ env.CLOUD_ENV }} \
            -n \
            -- php artisan migrate --force

      # ── Staging-only seeding ──────────────────────────────────────────────
      # Runs automatically on every staging push, or manually via workflow_dispatch
      # with seed=true. Never runs on production to protect live data.
      - name: Seed Staging Dataset
        if: env.CLOUD_ENV == 'staging' && (github.event_name == 'push' || inputs.seed == 'true')
        run: |
          export PATH=$PATH:$(composer global config bin-dir --absolute)
          cloud run \
            --app=${{ env.CLOUD_APP_ID }} \
            --environment=staging \
            -n \
            -- php artisan db:seed --class=FullApplicationSeeder --force
        continue-on-error: true

      - name: Monitor Deployment
        if: always()
        run: |
          export PATH=$PATH:$(composer global config bin-dir --absolute)
          cloud deploy:monitor -n
