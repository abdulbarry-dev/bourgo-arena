name: Deploy to Laravel Cloud

on:
  push:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      seed:
        description: 'Run seeders after deployment (staging only)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  test:
    runs-on: ubuntu-latest
    environment: Testing

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm ci

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Inject Test Environment Variables
        run: |
          sed -i "s|^DB_CONNECTION=.*|DB_CONNECTION=${{ secrets.DB_CONNECTION }}|" .env
          sed -i "s|^DB_HOST=.*|DB_HOST=${{ secrets.DB_HOST }}|" .env
          sed -i "s|^DB_PORT=.*|DB_PORT=${{ secrets.DB_PORT }}|" .env
          sed -i "s|^DB_DATABASE=.*|DB_DATABASE=${{ secrets.DB_DATABASE }}|" .env
          sed -i "s|^DB_USERNAME=.*|DB_USERNAME=${{ secrets.DB_USERNAME }}|" .env
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${{ secrets.DB_PASSWORD }}|" .env
          sed -i "s|^RESEND_API_KEY=.*|RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}|" .env
          sed -i "s|^KONNECT_API_KEY=.*|KONNECT_API_KEY=${{ secrets.KONNECT_API_KEY }}|" .env
          sed -i "s|^KONNECT_API_SECRET=.*|KONNECT_API_SECRET=${{ secrets.KONNECT_API_SECRET }}|" .env
          sed -i "s|^KONNECT_SANDBOX=.*|KONNECT_SANDBOX=${{ secrets.KONNECT_SANDBOX }}|" .env
          sed -i "s|^TWILIO_ACCOUNT_SID=.*|TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}|" .env
          sed -i "s|^TWILIO_AUTH_TOKEN=.*|TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}|" .env
          sed -i "s|^TWILIO_FROM_NUMBER=.*|TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }}|" .env
          sed -i "s|^FIREBASE_PROJECT=.*|FIREBASE_PROJECT=${{ secrets.FIREBASE_PROJECT }}|" .env
          sed -i "s|^DEV_INTEGRITY_BYPASS_TOKEN=.*|DEV_INTEGRITY_BYPASS_TOKEN=${{ secrets.DEV_INTEGRITY_BYPASS_TOKEN }}|" .env
          sed -i "s|^API_WEB_PLATFORM_ENABLED=.*|API_WEB_PLATFORM_ENABLED=${{ secrets.API_WEB_PLATFORM_ENABLED }}|" .env

      - name: Build Frontend
        run: npm run build

      - name: Lint
        run: vendor/bin/pint --test

      - name: Run Tests
        run: php artisan test --compact

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    env:
      LARAVEL_CLOUD_TOKEN: ${{ secrets.LARAVEL_CLOUD_TOKEN }}
      CLOUD_APP_ID: ${{ secrets.LARAVEL_CLOUD_APP_ID }}
      CLOUD_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Laravel Cloud CLI
        run: composer global require laravel/cloud-cli

      - name: Deploy to Laravel Cloud
        run: |
          export PATH=$PATH:$(composer global config bin-dir --absolute)
          cloud deploy \
            --app=${{ env.CLOUD_APP_ID }} \
            --environment=${{ env.CLOUD_ENV }} \
            --commit=${{ github.sha }} \
            --wait \
            -n

      - name: Run Migrations
        run: |
          export PATH=$PATH:$(composer global config bin-dir --absolute)
          cloud run \
            --app=${{ env.CLOUD_APP_ID }} \
            --environment=${{ env.CLOUD_ENV }} \
            -n \
            -- php artisan migrate --force

      # ── Production-safe seeding ───────────────────────────────────────────
      # Creates/updates staff accounts (updateOrCreate so it's idempotent).
      - name: Seed Staff Accounts (Production)
        if: env.CLOUD_ENV == 'production'
        run: |
          export PATH=$PATH:$(composer global config bin-dir --absolute)
          cloud run \
            --app=${{ env.CLOUD_APP_ID }} \
            --environment=production \
            -n \
            -- php artisan db:seed --class=DatabaseSeeder --force

      # ── Staging-only full seeding ─────────────────────────────────────────
      # Runs automatically on every staging push, or manually via workflow_dispatch
      # with seed=true. Never runs on production to protect live data.
      - name: Seed Staging Dataset
        if: env.CLOUD_ENV == 'staging' && (github.event_name == 'push' || inputs.seed == 'true')
        run: |
          export PATH=$PATH:$(composer global config bin-dir --absolute)
          cloud run \
            --app=${{ env.CLOUD_APP_ID }} \
            --environment=staging \
            -n \
            -- php artisan db:seed --class=FullApplicationSeeder --force
        continue-on-error: true

      - name: Monitor Deployment
        if: always()
        run: |
          export PATH=$PATH:$(composer global config bin-dir --absolute)
          cloud deploy:monitor -n
